<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particles Tech</title>

<!-- Fonte futurista -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#05070d;
    font-family:'Orbitron', sans-serif;
    overflow:hidden;
    color:#00ffcc;
}

/* Canvas ocupa tela toda */
#particles-js{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
}

/* Texto central */
.content{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    pointer-events:none;
}

.content h1{
    font-size:60px;
    text-shadow:0 0 20px #00ffcc;
}

.content p{
    margin-top:15px;
    font-size:18px;
    opacity:0.8;
}
</style>

</head>
<body>

<div id="particles-js"></div>

<div class="content">
    <h1>PARTICLE SYSTEM</h1>
    <p>Mova o mouse e interaja com as partículas</p>
</div>

<!-- Biblioteca particles -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 90 },
    color: { value: "#00ffcc" },
    shape: { type: "circle" },
    opacity: { value: 0.6 },
    size: { value: 3 },
    line_linked: {
      enable: true,
      distance: 140,
      color: "#00ffcc",
      opacity: 0.3,
      width: 1
    },
    move: {
      enable: true,
      speed: 2,
      direction: "none",
      out_mode: "out"
    }
  },

  interactivity: {
    detect_on: "canvas",
    events: {
      onhover: {
        enable: true,
        mode: "repulse"
      },
      onclick: {
        enable: true,
        mode: "push"
      }
    },
    modes: {
      repulse: {
        distance: 120,
        duration: 0.4
      },
      push: {
        particles_nb: 6
      }
    }
  },

  retina_detect: true
});
</script>

</body>
</html>
